name: Node.js Bot

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install dependencies
      # قمنا بتغيير npm ci إلى npm install
      run: npm install
        
    - name: Run Bot
      run: npm start
